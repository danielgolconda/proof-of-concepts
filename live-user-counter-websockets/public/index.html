<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live User Counter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    #counter {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    #label {
      font-size: 1.1rem;
      color: #888;
    }

    #status {
      margin-top: 8px;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 999px;
      font-weight: 500;
    }

    #status.connected    { background: #1a3a1a; color: #4caf50; }
    #status.disconnected { background: #3a1a1a; color: #e57373; }
    #status.reconnecting { background: #3a2a10; color: #ffa726; }
  </style>
</head>
<body>
  <div id="counter">-</div>
  <div id="label">people viewing this page</div>
  <div id="status" class="disconnected">Disconnected</div>

  <script>
    const counter = document.getElementById("counter");
    const status  = document.getElementById("status");

    let ws;
    let retryDelay = 1000;
    const MAX_DELAY = 30_000;

    function setStatus(state, text) {
      status.className = state;
      status.textContent = text;
    }

    function connect() {
      const url = `ws://${location.host}`;
      ws = new WebSocket(url);

      ws.addEventListener("open", () => {
        retryDelay = 1000;
        setStatus("connected", "Connected");
      });

      ws.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        if (data.type === "update") {
          counter.textContent = data.count;
        }
      });

      ws.addEventListener("close", () => {
        counter.textContent = "-";
        setStatus("reconnecting", `Reconnecting in ${retryDelay / 1000}s…`);
        setTimeout(() => {
          setStatus("reconnecting", "Reconnecting…");
          connect();
        }, retryDelay);
        retryDelay = Math.min(retryDelay * 2, MAX_DELAY);
      });

      ws.addEventListener("error", () => {
        setStatus("disconnected", "Disconnected");
        ws.close();
      });
    }

    connect();
  </script>
</body>
</html>
